name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            target_os: linux
            ext: ""
          - os: ubuntu-24.04-arm
            arch: arm64
            target_os: linux
            ext: ""
          - os: windows-latest
            arch: amd64
            target_os: windows
            ext: ".exe"
            msvc_arch: x64
          - os: windows-11-arm
            arch: arm64
            target_os: windows
            ext: ".exe"
            msvc_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Install dependencies
        run: nimble install -y zippy

      - name: Setup MSVC
        if: matrix.target_os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Setup musl-tools (Linux)
        if: matrix.target_os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (Linux)
        if: matrix.target_os == 'linux'
        run: nimble build -y -d:release --gcc.exe:musl-gcc --gcc.linkerexe:musl-gcc --passL:-static

      - name: Build (Windows)
        if: matrix.target_os == 'windows'
        run: nimble build -y -d:release --cc:vcc --cpu:${{ matrix.arch }}

      - name: Rename binary (Linux)
        if: matrix.target_os == 'linux'
        run: mv unity_packager unity_packager-${{ matrix.target_os }}-${{ matrix.arch }}

      - name: Rename binary (Windows)
        if: matrix.target_os == 'windows'
        shell: pwsh
        run: Move-Item unity_packager.exe unity_packager-${{ matrix.target_os }}-${{ matrix.arch }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: unity_packager-${{ matrix.target_os }}-${{ matrix.arch }}
          path: unity_packager-${{ matrix.target_os }}-${{ matrix.arch }}${{ matrix.ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  docker:
    name: Build and Push Docker Image by Architecture
    needs: build
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: unity_packager-linux-${{ matrix.arch }}
          path: bin

      - name: Prepare binary for Docker
        run: |
          chmod +x bin/unity_packager-linux-${{ matrix.arch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set lowercase repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=ghcr.io/${{ env.REPO }},push-by-digest=true,name-canonical=true,push=true
          file: Dockerfile

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Create and Push Docker Manifest
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set lowercase repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ env.REPO }}@sha256:%s ' *)
